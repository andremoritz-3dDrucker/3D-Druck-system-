<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D-Druck Service | Bestellung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --v-bg: #fafafa; --v-blue: #0070f3; --v-border: #eaeaea; }
        body { font-family: -apple-system, sans-serif; background: var(--v-bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; border: 1px solid var(--v-border); border-radius: 8px; padding: 25px; width: 100%; max-width: 450px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid var(--v-border); border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-black { background: #000; color: #fff; }
        .btn-ghost { background: transparent; color: #666; border: 1px solid var(--v-border); }
        .hidden { display: none; }
        .status-bar { background: #f0f7ff; padding: 10px; border-radius: 6px; font-size: 0.8rem; margin-bottom: 15px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <div id="authBox">
        <h2>Willkommen</h2>
        <input type="email" id="email" placeholder="E-Mail">
        <input type="password" id="pass" placeholder="Passwort">
        <button class="btn btn-black" onclick="handleAuth()">Einloggen / Registrieren</button>
        <button class="btn btn-ghost" style="margin-top:10px" onclick="showForm('Gast')">Als Gast bestellen</button>
    </div>

    <div id="orderBox" class="hidden">
        <div class="status-bar"><span id="userMail"></span><span onclick="location.reload()" style="color:red; cursor:pointer">Logout</span></div>
        <h2>Druckauftrag</h2>
        <input type="text" id="kName" placeholder="Dein Name">
        <input type="text" id="pName" placeholder="Projektname">
        <select id="material">
            <option>PLA Schwarz</option>
            <option>PLA Weiß</option>
            <option>PETG Grau</option>
        </select>
        <input type="text" id="fUrl" placeholder="Link zur Datei (Drive/Dropbox)">
        <textarea id="addr" placeholder="Lieferadresse"></textarea>
        <button class="btn btn-black" id="submitBtn" onclick="send()">Jetzt bestellen</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://zasufuyaiturzgohqkky.supabase.co';
    const supabaseKey = 'sb_publishable_8XYWszB4Vs9nAntw3rFlvA_c4MuUyOj';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            const { error: signUpErr } = await supabase.auth.signUp({ email, password });
            if (signUpErr) alert(signUpErr.message); else location.reload();
        } else { location.reload(); }
    }

    function showForm(mail) {
        document.getElementById('authBox').classList.add('hidden');
        document.getElementById('orderBox').classList.remove('hidden');
        document.getElementById('userMail').innerText = mail;
    }

    async function send() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "Sendet...";
        const { error } = await supabase.from('kundenAnfragen').insert([{
            kunde_name: document.getElementById('kName').value,
            projekt_name: document.getElementById('pName').value,
            gewuenschte_farbe: document.getElementById('material').value,
            datei_url: document.getElementById('fUrl').value,
            lieferadresse: document.getElementById('addr').value,
            status: 'Neu'
        }]);
        if (error) alert(error.message); else { alert("Erfolgreich!"); location.reload(); }
    }

    supabase.auth.getUser().then(({data}) => { if(data.user) showForm(data.user.email); });
</script>
</body>
</html>
